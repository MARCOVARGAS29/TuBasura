<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horarios de Recoleccion</title>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <p class="eyebrow">TuBasura</p>
        <h1>Consulta el horario de recoleccion</h1>
        <p class="description">
          Selecciona tu distrito para conocer los dias y la hora aproximada en
          la que pasa el camion recolector.
        </p>

        <div class="field">
          <label for="district-select">Distrito</label>
          <select id="district-select" name="district">
            <option value="">Selecciona un distrito</option>
          </select>
        </div>

        <section id="schedule-result" class="schedule-card" aria-live="polite">
          <h2>Horario de recoleccion</h2>
          <p>Selecciona un distrito para ver su horario.</p>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
